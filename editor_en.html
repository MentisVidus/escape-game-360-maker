<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>360 Escape Room Builder - No Code</title>
    
    <!-- Import Pannellum library to display 360 images -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.7/build/pannellum.css">
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.7/build/pannellum.js"></script>
    
    <!-- ========================================== -->
    <!-- CSS STYLES FOR THE EDITOR INTERFACE        -->
    <!-- ========================================== -->
    <style>
        /* Global page style */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #e9ecef; margin: 0; padding: 20px; color: #333; }
        .app-container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        
        /* Toolbar (Save / Load) */
        .top-toolbar { display: flex; gap: 10px; margin-bottom: 20px; background: #ecf0f1; padding: 15px; border-radius: 8px; }
        .btn-save { background: #2980b9; flex: 1; font-size: 16px; }
        .btn-load { background: #8e44ad; flex: 1; font-size: 16px; }
        
        /* Main game generation button */
        .btn-generate { background: #27ae60; width: 100%; font-size: 20px; margin-top: 30px; padding: 15px; }
        .btn-generate:hover { background: #2ecc71; }
        
        /* Visual blocks (Scenes and Hotspots) */
        .scene-block { border: 2px solid #3498db; border-radius: 8px; padding: 15px; margin-top: 20px; background: #f8fbff; }
        .scene-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-bottom: 10px; background: #eaf2f8; padding: 10px; border-radius: 5px; }
        .hotspot-block { border: 1px solid #2ecc71; border-left: 5px solid #2ecc71; padding: 15px; margin-top: 15px; background: white; border-radius: 5px; }
        
        /* Form elements (Inputs, buttons) */
        input, select, textarea { width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
        .row { display: flex; gap: 10px; }
        .col { flex: 1; }
        button { cursor: pointer; padding: 10px 15px; border: none; border-radius: 5px; font-weight: bold; color: white; transition: 0.2s; }
        
        /* Specific action buttons */
        .btn-add-scene { background: #3498db; width: 100%; font-size: 16px; margin-top: 20px; }
        .btn-add-hs { background: #2ecc71; font-size: 14px; margin-top: 10px; }
        .btn-del { background: #e74c3c; padding: 5px 10px; }
        .btn-target { background: #e67e22; width: 100%; font-size: 14px; margin-bottom: 10px; }
        .btn-preview-scene { background: #f39c12; color: white; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* Small interface buttons (Arrows, Duplicate, Collapse) */
        .btn-icon { background: #95a5a6; color: white; padding: 6px 10px; border-radius: 4px; margin-right: 3px; font-size: 14px; }
        .btn-icon:hover { background: #7f8c8d; }
        
        /* Optional title fields (Notes for the user) */
        .title-input { display: inline-block; width: 250px; margin: 0 0 0 15px; padding: 5px; border: 1px dashed #ccc; background: white; }

        /* CSS Editor (Expert Mode) */
        .dynamic-fields { padding: 15px; background: #f9f9f9; border: 1px dashed #ccc; margin-top: 10px; border-radius: 4px; }
        textarea.css-editor { font-family: 'Courier New', Courier, monospace; background: #2d3436; color: #f1c40f; font-size: 13px; }

        /* Visual CSS Editor (No-Code Mode) */
        .visual-css-editor { background: #ecf0f1; border: 1px solid #bdc3c7; padding: 10px; border-radius: 5px; margin-bottom: 10px; font-size: 13px; }
        .visual-css-editor label { display: block; margin-top: 5px; font-weight: bold; color: #34495e; }
        input[type="color"] { padding: 0; border: none; border-radius: 4px; cursor: pointer; height: 35px; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid #ccc; border-radius: 4px; }
        
        /* Modal Windows (Full screen popups) */
        .modal-fullscreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; }
        .modal-header { padding: 15px; background: #222; color: white; display: flex; justify-content: space-between; align-items: center; font-size: 18px; }

        /* Inventory settings */
        #inv-settings { background: #fff3cd; padding: 15px; margin-top: 10px; border-radius: 8px; border: 1px solid #ffeeba; }
    </style>
    
    <!-- Style tag used to inject CSS during the Live scene preview -->
    <style id="live-preview-styles"></style>
</head>
<body>

<div class="app-container">
    <h1>🧩 360° Escape Room Builder</h1>
    
    <div style="text-align: center; margin-bottom: 20px;">
        <a href="editeur.html" style="text-decoration: none; font-size: 14px; color: #3498db;">🇫🇷 Passer en version Française</a>
    </div>

    <!-- ========================================== -->
    <!-- TOOLBAR AND GLOBAL SETTINGS                -->
    <!-- ========================================== -->
    <div class="top-toolbar">
        <button class="btn-save" onclick="saveProject()">💾 Save Project (.json)</button>
        <button class="btn-load" onclick="document.getElementById('file-import').click()">📂 Load Project (.json)</button>
        <!-- Hidden input used to open the file selection window -->
        <input type="file" id="file-import" style="display:none;" accept=".json" onchange="loadProject(event)">
    </div>

    <label>Game Title:</label>
    <input type="text" id="gameTitle" value="My Awesome Game">
    
    <label style="font-size: 18px; font-weight: bold; margin-top:15px; display:block;">
        <input type="checkbox" id="useInventory" checked onchange="toggleInvSettings()"> Enable Inventory System
    </label>
    
    <div id="inv-settings">
        <div class="row">
            <div class="col"><label>Screen Position:</label><select id="inv-pos"><option value="top-right">Top Right</option><option value="top-left">Top Left</option><option value="bottom-right">Bottom Right</option><option value="bottom-left">Bottom Left</option></select></div>
            <div class="col"><label>Icon/Logo (Emoji or URL):</label><input type="text" id="inv-icon" value="🎒"></div>
        </div>
        <div class="row">
            <div class="col"><label>Panel CSS Background:</label><input type="text" id="inv-bg" value="rgba(0,0,0,0.8)"></div>
            <div class="col"><label>Text Color:</label><input type="text" id="inv-color" value="white"></div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- SCENES CONTAINER AND ADD BUTTONS           -->
    <!-- ========================================== -->
    <!-- This is where "Scene" blocks will be injected by Javascript -->
    <div id="scenes-container"></div>
    
    <button class="btn-add-scene" onclick="addScene()">+ ADD A NEW SCENE</button>
    <button class="btn-generate" onclick="generateGame()">🚀 GENERATE MY GAME (INDEX.HTML)</button>

    <!-- CREDITS AND LICENSE -->
    <div style="text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid #ccc; font-size: 13px; color: #7f8c8d; line-height: 1.5;">
        <p>🛠️ Created by <b>Renald Gauthier</b> with the great assistance of <b>Perplexity AI</b>.</p>
        <p>
            <a rel="license" href="http://creativecommons.org/licenses/by-sa/4.0/" target="_blank">
                <img alt="Creative Commons License" style="border-width:0; vertical-align: middle; margin-bottom: 5px;" src="https://i.creativecommons.org/l/by-sa/4.0/88x31.png" />
            </a><br />
            This work is licensed under a <a rel="license" href="http://creativecommons.org/licenses/by-sa/4.0/" target="_blank" style="color: #3498db; text-decoration: none;">Creative Commons Attribution-ShareAlike 4.0 International License</a>.<br>
        </p>
    </div>
</div>

<!-- ========================================== -->
<!-- MODAL WINDOWS (Hidden by default)          -->
<!-- ========================================== -->

<!-- MODAL WINDOW: CAPTURE COORDINATES (Picker) -->
<div id="picker-modal" class="modal-fullscreen">
    <div class="modal-header">
        <div><span>📍 Target: Pitch <b id="live-pitch">0</b> | Yaw <b id="live-yaw">0</b></span></div>
        <div>
            <button onclick="validerCoordonnees()" style="background:#27ae60; margin-right:10px;">✅ Confirm</button>
            <button onclick="closePicker()" style="background:#e74c3c;">Cancel</button>
        </div>
    </div>
    <div style="position:relative; flex-grow:1; width:100%;">
        <div id="picker-panorama" style="width:100%; height:100%;"></div>
        <!-- Yellow cross in the center of the screen to aim -->
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); pointer-events:none; color:rgba(255,255,0,0.8); font-size:40px; font-weight:bold; text-shadow: 0 0 5px black;">+</div>
    </div>
</div>

<!-- MODAL WINDOW: LIVE SCENE PREVIEW -->
<div id="scene-preview-modal" class="modal-fullscreen">
    <div class="modal-header">
        <div><span>👁️ <b>Live Scene Preview</b></span></div>
        <button onclick="closeScenePreview()" style="background:#e74c3c;">Close Preview</button>
    </div>
    <div id="scene-preview-panorama" style="flex-grow:1; width:100%;"></div>
</div>

<!-- ========================================== -->
<!-- JAVASCRIPT SCRIPTS (Editor Logic)          -->
<!-- ========================================== -->
<script>
// --- GLOBAL VARIABLES ---
// Counters to give a unique ID to each scene and hotspot added
let sceneIdCounter = 0; 
let hsIdCounter = 0;

// Variables for the 360 target tool (Picker)
let currentPickerHsId = null; 
let pickerViewer = null; 
let tempPitch = 0; 
let tempYaw = 0;

// Variable for the preview player
let scenePreviewViewer = null;

// --- FUNCTION: Show/Hide inventory settings ---
function toggleInvSettings() { 
    document.getElementById('inv-settings').style.display = document.getElementById('useInventory').checked ? "block" : "none"; 
}

// --- VISUAL ERGONOMICS FUNCTIONS (Collapse, Move Up, Move Down) ---
// Hides or shows the content of a scene or hotspot
function toggleCollapse(bodyId, btn) {
    const body = document.getElementById(bodyId);
    if(body.style.display === 'none') { 
        body.style.display = 'block'; 
        btn.innerHTML = '▼'; 
    } else { 
        body.style.display = 'none'; 
        btn.innerHTML = '▶'; 
    }
}
// Moves an HTML element right above its previous neighbor
function moveUp(elemId) { 
    const el = document.getElementById(elemId); 
    if(el.previousElementSibling) el.parentNode.insertBefore(el, el.previousElementSibling); 
}
// Moves an HTML element right below its next neighbor
function moveDown(elemId) { 
    const el = document.getElementById(elemId); 
    if(el.nextElementSibling) el.parentNode.insertBefore(el.nextElementSibling, el); 
}

// --- FUNCTION: ADD A SCENE ---
// Creates the HTML code of a new scene and injects it into the page
function addScene(scIdVal = null, scImgVal = null, scTitleVal = "") {
    sceneIdCounter++; 
    const sId = sceneIdCounter;
    
    // Default values if not provided (e.g. during loading)
    if(!scIdVal) scIdVal = "scene_" + sId; 
    if(!scImgVal) scImgVal = "room.jpg";
    
    const sceneHTML = `
    <div class="scene-block" id="scene_${sId}">
        <div class="scene-header">
            <div style="display:flex; align-items:center;">
                <button class="btn-icon" onclick="toggleCollapse('scene_body_${sId}', this)">▼</button>
                <h3 style="margin:0;">🎬 Scene ${sId}</h3>
                <input type="text" class="title-input sc-title" placeholder="Note (e.g. Kitchen)" value="${scTitleVal}">
            </div>
            <div>
                <button class="btn-icon" onclick="moveUp('scene_${sId}')" title="Move Up">⬆️</button>
                <button class="btn-icon" onclick="moveDown('scene_${sId}')" title="Move Down">⬇️</button>
                <button class="btn-icon" onclick="duplicateScene(${sId})" title="Duplicate entire scene">📑</button>
                <button class="btn-preview-scene" onclick="previewScene(${sId})">👁️ Preview</button>
                <button class="btn-del" onclick="document.getElementById('scene_${sId}').remove()">X</button>
            </div>
        </div>
        <div id="scene_body_${sId}">
            <div class="row">
                <div class="col"><label>System ID (e.g. kitchen) :</label><input type="text" class="sc-id" value="${scIdVal}"></div>
                <div class="col"><label>360 Image (e.g. room.jpg or http...) :</label><input type="text" class="sc-img" value="${scImgVal}"></div>
            </div>
            <h4>Interaction Points</h4>
            <div id="hs-container-${sId}"></div>
            <button class="btn-add-hs" onclick="addHotspot(${sId})">+ Add an interaction point</button>
        </div>
    </div>`;
    
    document.getElementById('scenes-container').insertAdjacentHTML('beforeend', sceneHTML); 
    return sId;
}

// --- FUNCTION: ADD A HOTSPOT ---
// Adds an interaction point to a specific scene
function addHotspot(sceneId, hsData = null) {
    hsIdCounter++; 
    const hId = hsIdCounter;
    
    // Define Hotspot default values
    let pitch = 0, yaw = 0, type = 'msg', hsTitleVal = "";
    let customCss = "width: 120px; height: 250px; background: rgba(255,0,0,0.2); border-radius: 0px; cursor: pointer; display: flex; align-items: center; justify-content: center;";
    
    // Default values for No-Code UI
    let uiW = 120, uiH = 250, uiShape = "0px", uiBgc = "#ff0000", uiBga = "0.2", uiImg = "";
    let uiBrdStyle = "none", uiBrdW = 2, uiBrdC = "#ffffff";

    // If data is provided (e.g. JSON loading or duplication), overwrite default values
    if(hsData) { 
        pitch = hsData.pitch; yaw = hsData.yaw; customCss = hsData.customCss; type = hsData.type; 
        if(hsData.hsTitle) hsTitleVal = hsData.hsTitle;
        if(hsData.ui_w !== undefined) { 
            uiW = hsData.ui_w; uiH = hsData.ui_h; uiShape = hsData.ui_shape; uiBgc = hsData.ui_bgc; uiBga = hsData.ui_bga; uiImg = hsData.ui_img; 
            uiBrdStyle = hsData.ui_brd_style || "none"; uiBrdW = hsData.ui_brd_w || 2; uiBrdC = hsData.ui_brd_c || "#ffffff";
        }
    }

    // HTML block creation for the hotspot
    const hsHTML = `
    <div class="hotspot-block" id="hs_${hId}">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px; background:#e8f8f5; padding:8px; border-radius:5px;">
            <div style="display:flex; align-items:center;">
                <button class="btn-icon" onclick="toggleCollapse('hs_body_${hId}', this)">▼</button>
                <b>Hotspot ${hId}</b>
                <input type="text" class="title-input hs-title" placeholder="Note (e.g. Blue Door)" value="${hsTitleVal}">
            </div>
            <div>
                <button class="btn-icon" onclick="moveUp('hs_${hId}')" title="Move Up">⬆️</button>
                <button class="btn-icon" onclick="moveDown('hs_${hId}')" title="Move Down">⬇️</button>
                <button class="btn-icon" onclick="duplicateHotspot(${sceneId}, ${hId})" title="Duplicate hotspot">📑</button>
                <button class="btn-del" onclick="document.getElementById('hs_${hId}').remove()">X</button>
            </div>
        </div>
        
        <div id="hs_body_${hId}">
            <button class="btn-target" onclick="openPicker(${sceneId}, ${hId})">📍 Place visually (Pitch / Yaw)</button>
            
            <div class="row">
                <div class="col"><label>Pitch :</label><input type="number" step="0.1" class="hs-pitch" value="${pitch}"></div>
                <div class="col"><label>Yaw :</label><input type="number" step="0.1" class="hs-yaw" value="${yaw}"></div>
            </div>
            
            <!-- Visual No-Code Editor -->
            <div class="visual-css-editor" id="nocode_ui_${hId}">
                <b style="color:#2980b9;">🎨 Visual Style Editor :</b>
                <div class="row">
                    <div class="col"><label>Width:</label><input type="number" class="ui-w" value="${uiW}" oninput="buildCss(${hId})"></div>
                    <div class="col"><label>Height:</label><input type="number" class="ui-h" value="${uiH}" oninput="buildCss(${hId})"></div>
                    <div class="col"><label>Shape:</label><select class="ui-shape" onchange="buildCss(${hId})"><option value="0px" ${uiShape==='0px'?'selected':''}>Square/Rect</option><option value="50%" ${uiShape==='50%'?'selected':''}>Circle</option></select></div>
                </div>
                <div class="row">
                    <div class="col"><label>Background Color:</label><input type="color" class="ui-bgc" value="${uiBgc}" oninput="buildCss(${hId})"></div>
                    <div class="col"><label>Opacity (0 to 1):</label><input type="range" class="ui-bga" min="0" max="1" step="0.1" value="${uiBga}" oninput="buildCss(${hId})"></div>
                </div>
                <div class="row">
                    <div class="col"><label>Border Style:</label><select class="ui-brd-style" onchange="buildCss(${hId})"><option value="none" ${uiBrdStyle==='none'?'selected':''}>None</option><option value="solid" ${uiBrdStyle==='solid'?'selected':''}>Solid</option><option value="dashed" ${uiBrdStyle==='dashed'?'selected':''}>Dashed</option></select></div>
                    <div class="col"><label>Border Width:</label><input type="number" class="ui-brd-w" value="${uiBrdW}" oninput="buildCss(${hId})"></div>
                    <div class="col"><label>Border Color:</label><input type="color" class="ui-brd-c" value="${uiBrdC}" oninput="buildCss(${hId})"></div>
                </div>
                <div class="row">
                    <div class="col"><label>Image URL (optional):</label><input type="text" class="ui-img" value="${uiImg}" placeholder="e.g. icon.png" oninput="buildCss(${hId})"></div>
                </div>
            </div>

            <!-- Free CSS Code Editor -->
            <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-top:15px;">
                <label>Generated CSS Code :</label>
                <button class="btn-icon" style="background:#7f8c8d; margin-bottom:5px;" onclick="toggleExpertMode(${hId})">🧑‍💻 Expert Mode (Free CSS)</button>
            </div>
            <textarea class="css-editor hs-custom-css" id="css_text_${hId}" rows="2" readonly>${customCss}</textarea>
            
            <!-- Hotspot Action Type -->
            <label style="margin-top:10px;">Action on click :</label>
            <select class="hs-type" onchange="updateHsFields(${hId})">
                <option value="msg">Show message</option>
                <option value="pick">Pick up item</option>
                <option value="req">Require item</option>
                <option value="pwd">Riddle / Code</option>
                <option value="scene">Go to scene</option>
            </select>
            <!-- Container showing specific fields based on chosen type -->
            <div class="dynamic-fields" id="fields_${hId}"></div>
        </div>
    </div>`;
    
    // Inject Hotspot into the correct scene
    document.getElementById(`hs-container-${sceneId}`).insertAdjacentHTML('beforeend', hsHTML);
    
    const hsDiv = document.getElementById(`hs_${hId}`);
    hsDiv.querySelector('.hs-type').value = type;
    
    // Updates dynamic fields based on hotspot type
    updateHsFields(hId); 

    // Fill dynamic fields with saved data (if loading a project)
    if(hsData) {
        let fields = ['f-txt', 'f-target', 'f-trans-txt', 'f-trans-btn', 'f-enigme-txt', 'f-pwd', 'f-pwd-action', 'f-req-action', 'f-ok-msg', 'f-pick-id', 'f-pick-name', 'f-pick-msg', 'f-item-id', 'f-item-name', 'f-ok', 'f-ko'];
        fields.forEach(f => {
            let el = hsDiv.querySelector('.' + f);
            if(el && hsData[f.replace(/-/g, '_')] !== undefined) {
                el.value = hsData[f.replace(/-/g, '_')];
                if(f === 'f-pwd-action' || f === 'f-req-action') el.dispatchEvent(new Event('change')); // Forces sub-fields display
            }
        });
        // Restores expert mode state
        if(hsData.expertMode) toggleExpertMode(hId, true); 
    }
}

// --- DUPLICATION FUNCTIONS ---
// Extracts all data from an existing hotspot to copy it
function extractHotspotData(hId) {
    const hsDiv = document.getElementById(`hs_${hId}`);
    let hs = { 
        hsTitle: hsDiv.querySelector('.hs-title').value, 
        pitch: hsDiv.querySelector('.hs-pitch').value, 
        yaw: hsDiv.querySelector('.hs-yaw').value, 
        customCss: hsDiv.querySelector('.hs-custom-css').value, 
        type: hsDiv.querySelector('.hs-type').value 
    };
    
    let fields = ['f-txt', 'f-target', 'f-trans-txt', 'f-trans-btn', 'f-enigme-txt', 'f-pwd', 'f-pwd-action', 'f-req-action', 'f-ok-msg', 'f-pick-id', 'f-pick-name', 'f-pick-msg', 'f-item-id', 'f-item-name', 'f-ok', 'f-ko', 'ui-w', 'ui-h', 'ui-shape', 'ui-bgc', 'ui-bga', 'ui-brd-style', 'ui-brd-w', 'ui-brd-c', 'ui-img'];
    fields.forEach(f => { 
        let el = hsDiv.querySelector('.' + f); 
        if(el) hs[f.replace(/-/g, '_')] = el.value; 
    });
    
    // Remembers if the user had activated expert mode for this hotspot
    if(!hsDiv.querySelector('.hs-custom-css').hasAttribute("readonly")) hs.expertMode = true;
    return hs;
}

// Asks the user where to copy the hotspot, then duplicates it
function duplicateHotspot(currentSId, hId) {
    let sceneList = ""; 
    let mapIds = [];
    
    // Prepares the scene list for the dialog box
    document.querySelectorAll('.scene-block').forEach((sDiv, idx) => {
        let sid = sDiv.id.split('_')[1];
        let title = sDiv.querySelector('.sc-title').value || sDiv.querySelector('.sc-id').value || "Scene " + sid;
        sceneList += `${idx + 1} : ${title}\n`;
        mapIds.push(sid);
    });
    
    let dest = prompt(`In which scene do you want to copy this hotspot?\n(Leave empty to copy in current scene)\n\nAvailable choices:\n${sceneList}`, "");
    let targetSId = currentSId;
    
    if(dest !== null && dest.trim() !== "") {
        let idx = parseInt(dest) - 1;
        if(idx >= 0 && idx < mapIds.length) targetSId = mapIds[idx];
        else alert("Invalid number. Copied to current scene.");
    } else if (dest === null) return; // If user clicks Cancel
    
    // Creates the new hotspot
    addHotspot(targetSId, extractHotspotData(hId));
}

// Duplicates an entire scene, copying all its hotspots
function duplicateScene(sId) {
    const sDiv = document.getElementById(`scene_${sId}`);
    
    // Creates the new scene
    const newSId = addScene(
        sDiv.querySelector('.sc-id').value + "_copy", 
        sDiv.querySelector('.sc-img').value, 
        sDiv.querySelector('.sc-title').value + " (Copy)"
    );
    
    // Copies each hotspot from old scene to the new one
    sDiv.querySelectorAll('.hotspot-block').forEach(hsDiv => {
        addHotspot(newSId, extractHotspotData(hsDiv.id.split('_')[1]));
    });
}

// --- CSS GENERATION FUNCTIONS (No-Code and Expert) ---
// Converts Hexadecimal color code (e.g. #ff0000) to RGBA code readable in CSS with transparency
function hexToRgba(hex, alpha) { 
    let r = parseInt(hex.slice(1, 3), 16), 
        g = parseInt(hex.slice(3, 5), 16), 
        b = parseInt(hex.slice(5, 7), 16); 
    return `rgba(${r}, ${g}, ${b}, ${alpha})`; 
}

// Gets values from No-Code sliders and builds the CSS string
function buildCss(hId) {
    const hsDiv = document.querySelector(`#hs_${hId}`);
    
    let w = hsDiv.querySelector('.ui-w').value;
    let h = hsDiv.querySelector('.ui-h').value;
    let shape = hsDiv.querySelector('.ui-shape').value;
    let bgc = hsDiv.querySelector('.ui-bgc').value;
    let bga = hsDiv.querySelector('.ui-bga').value;
    let brdStyle = hsDiv.querySelector('.ui-brd-style').value;

// Handles switching between No-Code editing mode and Expert Mode
function toggleExpertMode(hId, forceExpert = false) {
    const textArea = document.getElementById(`css_text_${hId}`); 
    const noCodeUi = document.getElementById(`nocode_ui_${hId}`); 
    const btn = document.querySelector(`#hs_${hId} button[onclick="toggleExpertMode(${hId})"]`);
    
    if (textArea.hasAttribute("readonly") || forceExpert) {
        // Activate Expert mode
        if(forceExpert || confirm("Warning: Switching to Expert Mode will disable visual buttons. Continue?")) {
            textArea.removeAttribute("readonly"); 
            textArea.style.border = "2px solid #e74c3c";
            noCodeUi.style.opacity = "0.3"; 
            noCodeUi.style.pointerEvents = "none"; // Blocks clicks on sliders
            btn.innerHTML = "🔙 Back to Visual Mode (Overwrites CSS)"; 
            btn.style.background = "#e74c3c";
        }
    } else {
        // Return to Visual mode
        textArea.setAttribute("readonly", "readonly"); 
        textArea.style.border = "1px solid #ccc";
        noCodeUi.style.opacity = "1"; 
        noCodeUi.style.pointerEvents = "auto";
        btn.innerHTML = "🧑‍💻 Expert Mode (Free CSS)"; 
        btn.style.background = "#7f8c8d"; 
        buildCss(hId); // Forces CSS regeneration via sliders to overwrite manual code
    }
}

    if(!scImg) return; 
    currentPickerHsId = hId; 
    document.getElementById('picker-modal').style.display = 'flex';

    // Adjusts path if image is local
    if (!imgUrl.startsWith('http') && !imgUrl.startsWith('data:')) imgUrl = "./" + imgUrl; 
    
    if(pickerViewer) pickerViewer.destroy(); 
    pickerViewer = pannellum.viewer('picker-panorama', { "type": "equirectangular", "panorama": imgUrl, "autoLoad": true, "showControls": false });

    pickerViewer.on('load', function() {

// --- .JSON FILE SAVE AND LOAD FUNCTIONS ---
function saveProject() {
    // Creates an object grouping all settings
    let project = { 
        title: document.getElementById('gameTitle').value, 
        useInv: document.getElementById('useInventory').checked, 
        invPos: document.getElementById('inv-pos').value, 
        invIcon: document.getElementById('inv-icon').value, 
        invBg: document.getElementById('inv-bg').value, 
        invColor: document.getElementById('inv-color').value, 
        scenes: [] 
    };
    
    // Loops through all created scenes
    document.querySelectorAll('.scene-block').forEach(sceneDiv => {
        let scene = { 
            scId: sceneDiv.querySelector('.sc-id').value, 
            scImg: sceneDiv.querySelector('.sc-img').value, 
            scTitle: sceneDiv.querySelector('.sc-title').value, 
            hotspots: [] 
        };
        // Loops through and extracts data from all hotspots in the scene
        sceneDiv.querySelectorAll('.hotspot-block').forEach(hsDiv => { 
            scene.hotspots.push(extractHotspotData(hsDiv.id.split('_')[1])); 
        });
        project.scenes.push(scene);
    });
    
    // Triggers JSON file download
    const blob = new Blob([JSON.stringify(project, null, 2)], { type: "application/json" });
    const lien = document.createElement("a"); 
    lien.href = URL.createObjectURL(blob); 
    lien.download = "project.json";
    document.body.appendChild(lien); 
    lien.click(); 
    document.body.removeChild(lien);
}

function loadProject(event) {
    const file = event.target.files[0]; 
    if (!file) return; 
    
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const project = JSON.parse(e.target.result);
            
            // Cleans current interface
            document.getElementById('scenes-container').innerHTML = ''; 
            sceneIdCounter = 0; 
            hsIdCounter = 0;
            
            // Restores global settings
            document.getElementById('gameTitle').value = project.title || "My Awesome Game";
            document.getElementById('useInventory').checked = project.useInv !== false; 
            toggleInvSettings();
            
            if(project.useInv !== false) { 
                document.getElementById('inv-pos').value = project.invPos || "top-right"; 
                document.getElementById('inv-icon').value = project.invIcon || "🎒"; 
                document.getElementById('inv-bg').value = project.invBg || "rgba(0,0,0,0.8)"; 
                document.getElementById('inv-color').value = project.invColor || "white"; 
            }
            
            // Restores scenes and hotspots
            project.scenes.forEach(scene => { 
                const sId = addScene(scene.scId, scene.scImg, scene.scTitle); 
                scene.hotspots.forEach(hs => { addHotspot(sId, hs); }); 
            });
        } catch (err) { alert("Invalid File!"); }
    };
    reader.readAsText(file); 
    event.target.value = ''; // Resets file input
}

                btn.style.cssText = 'background:transparent;color:#00ff00;border:1px solid #00ff00;padding:10px;margin-top:10px;cursor:pointer;';
                btn.onclick = function() {
                    if(inp.value.toLowerCase().trim() === args.pwd) { 
                        document.body.removeChild(msg); 
                        unlockedHotspots[args.id] = true; 
                        executeReward(args, hsDiv); 
                    } else { 
                        err.innerHTML = "INCORRECT ANSWER"; 
                        inp.value = ""; 
                        inp.focus(); 
                    }
                };
                msg.appendChild(btn); 
                
                var cls = document.createElement('button'); 
                cls.innerHTML = "X"; 
                cls.style.cssText = 'position:absolute;top:5px;right:5px;background:transparent;color:red;border:none;cursor:pointer;font-size:16px;';
                cls.onclick = function() { document.body.removeChild(msg); }; 
                
                msg.appendChild(cls); 
                document.body.appendChild(msg); 
                setTimeout(function(){ inp.focus(); }, 100);
            }
        };
    }
    
    // Updates item list in HTML menu
    function majInventaireUI() {

        var c = 0;

        if(c === 0) ul.innerHTML = '<li style="color:gray; font-style:italic;">Empty</li>';

        var btn = document.createElement('button');

        btn.style.cssText = 'margin-top:15px;cursor:pointer;padding:10px 20px;background:#27ae60;color:white;border:none;border-radius:5px;font-size:16px;';

        msg.appendChild(btn);

    const blob = new Blob([htmlTemplate], { type: "text/html;charset=utf-8" });
